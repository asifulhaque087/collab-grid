# Local-dev infrastructure for the realtime collaborative canvas.
# Run `docker compose up -d` from the repo root, then `pnpm dev`.
#
#   Redis    — atomic soft/hard locks, zone presence, viewport recovery.
#              Started with keyspace notifications enabled (Ex) so the gateway
#              can react to soft-lock key expiry and auto-release widgets.
#   RabbitMQ — async checkout queue + debounced widget-position persistence
#              (wired in a later branch; provisioned here so infra is ready).
services:
  redis:
    image: redis:7-alpine
    container_name: collabgrid-redis
    command: redis-server --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: collabgrid-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI (guest / guest)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  redis-data:
  rabbitmq-data:
